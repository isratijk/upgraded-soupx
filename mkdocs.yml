site_name: SoupX — Python
site_description: Ambient RNA contamination removal for droplet-based single-cell RNA-seq
site_author: Israt Jahan Khan
site_url: https://isratijk.github.io/Upgraded-soupX/

repo_name: IsratIJK/Upgraded-soupX
repo_url: https://github.com/IsratIJK/Upgraded-soupX

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Automatic Workflow: user-guide/automatic.md
      - Manual Workflow: user-guide/manual.md
      - DecontX: user-guide/decontx.md
      - Doublet-Aware Estimation: user-guide/doublets.md
      - Gene Heterogeneity: user-guide/gene-het.md
      - Iterative Refinement: user-guide/iterative.md
      - Downstream Analysis: user-guide/downstream.md
      - Visualization: user-guide/visualization.md
  - Datasets:
      - Overview: datasets.md
      - Downloading from S3: datasets.md#downloading-datasets-from-s3
  - API Reference:
      - SoupChannel: api/soup-channel.md
      - I/O: api/io.md
      - Estimation: api/estimation.md
      - Correction: api/correction.md
      - Metrics: api/metrics.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IsratIJK/Upgraded-soupX
  version:
    provider: mike
