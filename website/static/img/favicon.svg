<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.25"/>

  <!-- DNA helix strand 1 (front, solid) -->
  <path d="M62 36
           C62 57 138 57 138 78
           C138 99 62 99 62 120
           C62 141 138 141 138 163"
        fill="none"
        stroke="white"
        stroke-width="7"
        stroke-linecap="round"/>

  <!-- DNA helix strand 2 (back, semi-transparent) -->
  <path d="M138 36
           C138 57 62 57 62 78
           C62 99 138 99 138 120
           C138 141 62 141 62 163"
        fill="none"
        stroke="white"
        stroke-width="7"
        stroke-linecap="round"
        stroke-opacity="0.5"/>

  <!-- Rungs -->
  <line x1="62"  y1="36"  x2="138" y2="36"  stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="62"  y1="78"  x2="138" y2="78"  stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="62"  y1="120" x2="138" y2="120" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="62"  y1="163" x2="138" y2="163" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
</svg>
